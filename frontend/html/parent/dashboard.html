<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veli Paneli | Dershane Sistemi</title>
    <style>
        :root {
            --primary: #1a237e;
            --secondary: #3949ab;
            --bg-body: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-body); padding: 20px; color: var(--text-main); margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* Profil Kartı */
        .profile-card {
            background: var(--white);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            border-top: 8px solid var(--primary);
            position: relative;
        }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .welcome-text h2 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        .welcome-text p { margin: 5px 0 0; color: var(--text-muted); font-size: 0.9rem; }

        /* Çocuklarım Kartı */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .student-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-left: 6px solid var(--secondary);
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .student-card:hover { transform: translateY(-3px); }

        .student-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .student-name { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .student-target { font-size: 0.8rem; background: #eef2ff; color: var(--secondary); padding: 4px 10px; border-radius: 6px; font-weight: 700; }

        .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .info-label { color: var(--text-muted); font-weight: 600; }
        .info-value { color: var(--text-main); font-weight: 700; }

        .btn-logout { background: #fee2e2; color: #ef4444; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.8rem; }
    </style>
    <script src="/js/config.js"></script>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="header-flex">
            <div class="welcome-text">
                <h2 id="parent-name">Veli Bilgileri Yükleniyor...</h2>
                <p>Veli Bilgi Sistemi (2FA Korumalı)</p>
            </div>
            <a href="#" onclick="logout()" class="btn-logout">Güvenli Çıkış</a>
        </div>
    </div>

    <h3 style="margin-bottom: 15px; color: var(--text-main);">👨‍👩‍👧‍👦 Velisi Olduğum Öğrenciler</h3>
    
    <div id="students-list" class="student-grid">
        <p style="color: var(--text-muted)">Öğrenci verileri çekiliyor...</p>
    </div>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    location.href = "/";
}

function logout() {
    localStorage.clear();
    location.href = "/";
}

// Velinin çocuklarını getiren API
fetch(window.API_BASE + "/api/parent/dashboard", {
    headers: { "Authorization": "Bearer " + token }
})
.then(res => res.json())
.then(data => {
    // Veli Adı
    document.getElementById("parent-name").innerText = `Hoş geldiniz, ${data.parent.name}`;

    // Öğrenci Kartlarını Oluştur
    const list = document.getElementById("students-list");
    if (data.students && data.students.length > 0) {
        list.innerHTML = data.students.map(student => `
            <a href="ogrenci_durum_karti.html?id=${student.id}" class="student-card">
                <div class="student-header">
                    <div class="student-name">${student.name}</div>
                    <div class="student-target">${student.target_exam || 'Hedef Yok'}</div>
                </div>
                <div class="info-row">
                    <span class="info-label">Sınıf Seviyesi</span>
                    <span class="info-value">${student.grade}. Sınıf</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Okul</span>
                    <span class="info-value">${student.school}</span>
                </div>
                <div style="margin-top: 15px; text-align: right; font-size: 0.8rem; color: var(--secondary); font-weight: 800;">
                    Yıllık Performans ve AI Analizini Gör →
                </div>
            </a>
        `).join('');
    } else {
        list.innerHTML = "<p style='color:var(--text-muted)'>Kaydı eşleştirilmiş öğrenci bulunamadı.</p>";
    }
})
.catch(err => {
    console.error(err);
    document.getElementById("students-list").innerHTML = "<p>Veri alınamadı.</p>";
});
</script>

</body>
</html>
